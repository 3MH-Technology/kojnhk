name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports: ['27017:27017']
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.13', cache: 'pip' }
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Compile check
        run: python -m compileall app
      - name: Lint
        run: ruff check app
      - name: Import smoke test
        env:
          MONGO_URI: mongodb://localhost:27017
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: testtesttesttesttesttesttesttesttesttesttesttesttesttesttesttesttest
          ENCRYPTION_KEY: 4DumK7z1mFZzvLk2Q4JqP4vT3sH4nLXt8pYp9sXQ5a0=
        run: python -c "from app.main import app; print('ok')"

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  docker:
    runs-on: ubuntu-latest
    needs: [backend, web]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build api image
        run: docker build -f infra/docker/Dockerfile.api -t wormgpt-api:${{ github.sha }} .
      - name: Build web image
        run: docker build -f infra/docker/Dockerfile.web -t wormgpt-web:${{ github.sha }} .
